version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-delve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-delve}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-delve}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-delve}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-delve}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:${WEB_PORT:-8080}}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PLUGINS_DIR: ${PLUGINS_DIR:-/app/plugins}
      WEBHOOK_RATE_LIMIT: ${WEBHOOK_RATE_LIMIT:-60}
      # LLM providers
      ASK_SAGE_TOKEN: ${ASK_SAGE_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      # NOTE: Do NOT set NODE_TLS_REJECT_UNAUTHORIZED=0 here — it disables TLS
      # verification for ALL outbound connections (MITM risk). The embedding model
      # is pre-baked into the Docker image so no runtime download is needed.
    volumes:
      - plugins:/app/plugins
      - watched:/app/watched
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  plugins:
  watched:

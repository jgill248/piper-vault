<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#05070A"/>
  <!-- Vault door outline -->
  <rect x="6" y="8" width="20" height="18" rx="1" fill="none" stroke="#abd600" stroke-width="1.5"/>
  <!-- Vault handle (circular) -->
  <circle cx="16" cy="17" r="5" fill="none" stroke="#abd600" stroke-width="1.5"/>
  <!-- Vault handle spokes -->
  <line x1="16" y1="12" x2="16" y2="22" stroke="#abd600" stroke-width="1"/>
  <line x1="11" y1="17" x2="21" y2="17" stroke="#abd600" stroke-width="1"/>
  <!-- Keyhole -->
  <circle cx="16" cy="17" r="1.5" fill="#abd600"/>
</svg>

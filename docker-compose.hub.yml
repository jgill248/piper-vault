# Piper Vault — single-container all-in-one.
# Usage:
#   docker compose -f docker-compose.hub.yml up -d
#   Open http://localhost:8080
#
# All settings (API keys, LLM provider, auth) are managed via the Settings UI.
# No .env file required.
#
# Or run directly without compose:
#   docker run -p 8080:8080 pipervault/piper-vault:latest

services:
  delve:
    image: pipervault/piper-vault:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - config:/root/.delve
      - plugins:/app/plugins
      - watched:/app/watched
    # Harden: cap_drop ALL + re-add only what the standalone entrypoint needs.
    # CHOWN/FOWNER/DAC_OVERRIDE — PostgreSQL init (chown data dir, createdb)
    # SETGID/SETUID — su to postgres user in entrypoint
    # NET_BIND_SERVICE — nginx binds port 8080 (not needed on >1024, but kept for safety)
    # KILL — entrypoint sends SIGTERM to child processes on shutdown
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - KILL
      - NET_BIND_SERVICE
    # NOTE: no-new-privileges is NOT set here — the entrypoint uses `su` to
    # switch to the postgres user, which requires privilege transitions.
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    pids_limit: 256
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  pgdata:
  config:
  plugins:
  watched:

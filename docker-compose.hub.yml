# Single-container Docker Hub compose file — pull pre-built all-in-one image.
# Usage:
#   1. Copy .env.example to .env and fill in your LLM provider key(s)
#   2. docker compose -f docker-compose.hub.yml up -d
#   3. Open http://localhost:8080
#
# Or run directly without compose:
#   docker run -p 8080:8080 -v delve-data:/var/lib/postgresql/data creative-software/delve:latest

services:
  delve:
    image: creative-software/delve:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - plugins:/app/plugins
      - watched:/app/watched
    environment:
      # PostgreSQL (internal — defaults are fine for single-container use)
      POSTGRES_USER: ${POSTGRES_USER:-delve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-delve}
      POSTGRES_DB: ${POSTGRES_DB:-delve}
      # LLM providers — set the token/key for your chosen provider in .env
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_MODEL: ${LLM_MODEL:-}
      ASK_SAGE_TOKEN: ${ASK_SAGE_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      # Authentication (optional)
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # Advanced
      WEBHOOK_RATE_LIMIT: ${WEBHOOK_RATE_LIMIT:-60}

volumes:
  pgdata:
  plugins:
  watched:

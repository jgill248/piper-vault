version: '3.8'

# Docker Hub compose file — pull pre-built images, no local build required.
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose -f docker-compose.hub.yml up -d
#   3. Open http://localhost:8080

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-delve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
      POSTGRES_DB: ${POSTGRES_DB:-delve}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-delve}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  api:
    image: creative-software/delve-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-delve}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-delve}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:${WEB_PORT:-8080}}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PLUGINS_DIR: /app/plugins
      WEBHOOK_RATE_LIMIT: ${WEBHOOK_RATE_LIMIT:-60}
      # LLM providers — set the token/key for your chosen provider in .env
      ASK_SAGE_TOKEN: ${ASK_SAGE_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      # Bypass SSL verification for embedding model download (corporate proxies).
      # The model is pre-baked into the image, so this is only needed if the
      # cache is missing or the HuggingFace library re-downloads.
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    volumes:
      - plugins:/app/plugins
      - watched:/app/watched
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    image: creative-software/delve-web:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  plugins:
  watched:

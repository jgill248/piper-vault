name: Publish Docker image

# Publishes the standalone all-in-one image (PostgreSQL + API + Nginx) to
# Docker Hub as pipervault/piper-vault.
#
# Tagging scheme:
#   push to main      → pipervault/piper-vault:edge  (+ sha-<short>)
#   tag v1.2.3        → pipervault/piper-vault:1.2.3, :1.2, :latest
#   manual dispatch   → pipervault/piper-vault:edge  (+ sha-<short>)
#
# Requires repository secrets:
#   DOCKERHUB_USERNAME — Docker Hub account name
#   DOCKERHUB_TOKEN    — Docker Hub access token (Read & Write scope)

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push standalone image
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: pipervault/piper-vault
          tags: |
            type=edge,branch=main
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Piper Vault
            org.opencontainers.image.description=Self-hosted knowledge vault with AI-powered search

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: standalone
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

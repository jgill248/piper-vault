version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: delve-postgres
    environment:
      POSTGRES_USER: delve
      POSTGRES_PASSWORD: delve
      POSTGRES_DB: delve
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delve"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: delve-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@delve.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  pgadmin_data:

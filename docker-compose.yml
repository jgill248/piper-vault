version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: delve-postgres
    environment:
      POSTGRES_USER: delve
      POSTGRES_PASSWORD: delve
      POSTGRES_DB: delve
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delve"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
